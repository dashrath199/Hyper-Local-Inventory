name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Validate Frappe app structure + JSON + Python
        run: |
          echo "=== Running app structure validation ==="
          python .github/scripts/validate_app.py

          echo ""
          echo "=== Checking Python syntax (all .py files) ==="
          python -c "
import os, sys
errors = 0
for root, dirs, files in os.walk('.'):
    if '.git' in root:
        continue
    for f in files:
        if not f.endswith('.py'):
            continue
        path = os.path.join(root, f)
        try:
            compile(open(path, encoding='utf-8').read(), path, 'exec')
        except SyntaxError as e:
            print(f'❌ {path}: {e}')
            errors += 1
if errors:
    print(f'Found {errors} file(s) with syntax errors')
    sys.exit(1)
print('✅ All Python files compile successfully')
"

          echo ""
          echo "=== Validating all JSON files ==="
          python -c "
import json, os, sys
errors = 0
for root, dirs, files in os.walk('.'):
    if '.git' in root:
        continue
    for f in files:
        if not f.endswith('.json'):
            continue
        path = os.path.join(root, f)
        try:
            with open(path, encoding='utf-8') as fh:
                json.load(fh)
        except json.JSONDecodeError as e:
            print(f'❌ {path}: {e}')
            errors += 1
if errors:
    print(f'Found {errors} file(s) with invalid JSON')
    sys.exit(1)
print('✅ All JSON files are valid')
"

      - name: Check mandatory files exist
        run: |
          missing=0
          for file in \
            "setup.py" \
            "setup.cfg" \
            "requirements.txt" \
            "MANIFEST.in" \
            "license.txt" \
            "README.md" \
            ".gitignore" \
            "kirana_ledger/__init__.py" \
            "kirana_ledger/hooks.py" \
            "kirana_ledger/api.py"
          do
            if [ ! -f "$file" ]; then
              echo "❌ Mandatory file missing: $file"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then exit 1; fi
          echo "✅ All mandatory files present"
